user nginx;
worker_processes auto;
worker_rlimit_nofile 100000; # Maximize open file descriptors

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Core high-throughput optimizations
    sendfile        on;   # Zero-copy kernel transfers
    tcp_nopush      on;   # Optimize TCP packet payload size before sending
    tcp_nodelay     on;   # Prevent Nagle's algorithm from buffering small packets

    # Timeouts tuned for fast networks
    keepalive_timeout  65;
    keepalive_requests 10000;

    # Disable access logs to prevent disk I/O bottlenecks during stress tests
    access_log off;
    error_log /var/log/nginx/error.log crit;

    # Cache file descriptors
    open_file_cache max=1000 inactive=20s;
    open_file_cache_valid 30s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    server {
        listen 5000;
        server_name localhost;

        root /usr/share/nginx/html;

        location / {
            index index.html;
        }

        location /files/ {
            alias /usr/share/nginx/html/files/;
        }
    }
}
